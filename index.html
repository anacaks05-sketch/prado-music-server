<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prado Music DL">
<title>Prado Music DL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0A0A0F;--surface:#111118;--card:#16161F;
    --border:rgba(255,255,255,0.07);
    --accent:#7C3AED;--accent2:#A855F7;--glow:rgba(124,58,237,0.35);
    --text:#F0EEFF;--muted:#6B6B8A;
    --success:#22C55E;--warn:#F59E0B;--error:#EF4444;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100dvh;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,0);}
  body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);
    width:700px;height:700px;
    background:radial-gradient(circle,rgba(124,58,237,0.13) 0%,transparent 65%);
    pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 60px;}

  header{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-top:8px;}
  .logo-icon{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:24px;flex-shrink:0;box-shadow:0 0 24px var(--glow);}
  .logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;line-height:1;}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1.2px;margin-top:3px;}

  .input-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .input-label{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  textarea{width:100%;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;
    font-size:14px;line-height:1.7;padding:13px;resize:none;min-height:160px;
    outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);}
  .input-hint{font-size:11px;color:var(--muted);margin-top:8px;}

  .btn-row{display:flex;gap:10px;margin-bottom:16px;}
  .btn-main{flex:1;padding:16px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:12px;color:#fff;
    font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 4px 28px var(--glow);-webkit-tap-highlight-color:transparent;
    transition:opacity 0.2s,transform 0.1s;}
  .btn-main:active{transform:scale(0.98);opacity:0.9;}
  .btn-main:disabled{opacity:0.4;cursor:default;}
  .btn-clear{padding:16px 18px;background:var(--card);border:1px solid var(--border);
    border-radius:12px;color:var(--muted);font-size:19px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;}

  /* Progress */
  .progress-card{background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;margin-bottom:14px;display:none;}
  .progress-card.visible{display:block;}
  .progress-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .progress-label{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
  .progress-count{font-size:12px;color:var(--accent2);font-weight:600;}
  .progress-track{height:6px;background:var(--surface);border-radius:6px;overflow:hidden;margin-bottom:12px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width 0.5s ease;width:0%;}
  .progress-current{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent2);
    border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Track cards */
  .tracks-list{display:flex;flex-direction:column;gap:8px;}
  .track-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
    overflow:hidden;animation:fadeUp 0.25s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .track-top{display:flex;align-items:center;gap:10px;padding:12px 13px;}
  .track-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
    color:var(--accent2);min-width:18px;text-align:center;}
  .track-name{flex:1;font-size:13px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .track-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;flex-shrink:0;}
  .pill-wait{background:rgba(107,107,138,0.15);color:var(--muted);}
  .pill-dl{background:rgba(124,58,237,0.15);color:var(--accent2);}
  .pill-ok{background:rgba(34,197,94,0.12);color:var(--success);}
  .pill-err{background:rgba(239,68,68,0.12);color:var(--error);}

  /* Download button per track */
  .track-dl-btn{
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.08));
    border:none;border-top:1px solid var(--border);
    width:100%;padding:11px 13px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:opacity 0.2s;}
  .track-dl-btn:active{opacity:0.7;}
  .track-dl-icon{font-size:18px;}
  .track-dl-text{flex:1;text-align:left;}
  .track-dl-title{font-size:13px;font-weight:600;color:var(--success);}
  .track-dl-sub{font-size:11px;color:var(--muted);margin-top:1px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-icon">🎵</div>
    <div style="display:flex;flex-direction:column">
      <div class="logo-title">Prado Music DL</div>
      <div class="logo-sub">DOWNLOAD DIRETO DE MP3</div>
    </div>
  </header>

  <div class="input-card">
    <div class="input-label">Lista de músicas</div>
    <textarea id="musicInput" placeholder="Cole aqui, uma por linha:

Thiaguinho - Esquema Preferido
Sorriso Maroto - Por Você
Jeito Moleque - Pára Tudo
Jorge e Mateus - Com Você"></textarea>
    <div class="input-hint">Até 20 músicas • Formato: Artista - Música</div>
  </div>

  <div class="btn-row">
    <button class="btn-main" id="mainBtn" onclick="startDownload()">⬇️ Baixar MP3s</button>
    <button class="btn-clear" onclick="resetApp()">🗑️</button>
  </div>

  <div class="progress-card" id="progressCard">
    <div class="progress-top">
      <div class="progress-label">Baixando músicas...</div>
      <div class="progress-count" id="progressCount">0 / 0</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-current">
      <div class="spinner"></div>
      <span id="progressCurrent">Iniciando...</span>
    </div>
  </div>

  <div class="tracks-list" id="tracksList"></div>
</div>

<script>
const SERVER_URL = 'https://prado-music-server.onrender.com';
let jobId = null, pollInterval = null, tracks = [], busy = false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseTracks(raw){
  return raw.split('\n').map(l=>l.trim()).filter(l=>l.length>1).slice(0,20);
}

function renderTracks(list){
  document.getElementById('tracksList').innerHTML = list.map((t,i)=>`
    <div class="track-card" style="animation-delay:${i*0.03}s" id="tc-${i}">
      <div class="track-top">
        <div class="track-num">${i+1}</div>
        <div class="track-name">${esc(t)}</div>
        <div class="track-pill pill-wait" id="pill-${i}">Fila</div>
      </div>
    </div>`).join('');
}

function setTrackStatus(i, status, track){
  const pill = document.getElementById(`pill-${i}`);
  const card = document.getElementById(`tc-${i}`);
  if(!pill||!card) return;

  if(status==='dl'){
    pill.className='track-pill pill-dl'; pill.textContent='⬇️';
  } else if(status==='ok'){
    pill.className='track-pill pill-ok'; pill.textContent='✓ Pronto';
    // Adiciona botão de download
    const btn = document.createElement('button');
    btn.className='track-dl-btn';
    btn.innerHTML=`
      <div class="track-dl-icon">🎵</div>
      <div class="track-dl-text">
        <div class="track-dl-title">Baixar MP3</div>
        <div class="track-dl-sub">${esc(track.name||track.music)}</div>
      </div>
      <div style="color:var(--success);font-size:18px;">›</div>`;
    btn.onclick=()=>{ window.location.href=`${SERVER_URL}/get-mp3/${jobId}/${i}`; };
    card.appendChild(btn);
  } else if(status==='error'){
    pill.className='track-pill pill-err'; pill.textContent='✗ Erro';
  }
}

async function startDownload(){
  if(busy) return;
  const raw = document.getElementById('musicInput').value.trim();
  if(!raw){
    const ta=document.getElementById('musicInput');
    ta.style.borderColor='var(--error)';
    setTimeout(()=>ta.style.borderColor='',1200);
    return;
  }
  busy=true;
  tracks=parseTracks(raw);
  renderTracks(tracks);

  const btn=document.getElementById('mainBtn');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner" style="border-top-color:#fff;width:14px;height:14px;border-width:2px"></div> Processando...';

  document.getElementById('progressCard').classList.add('visible');
  document.getElementById('progressCount').textContent=`0 / ${tracks.length}`;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressCurrent').textContent='Conectando ao servidor...';

  try{
    const res=await fetch(`${SERVER_URL}/download`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({musics:tracks})
    });
    if(!res.ok) throw new Error('Erro servidor');
    const data=await res.json();
    jobId=data.job_id;
    btn.innerHTML='⏳ Baixando...';
    pollStatus();
  } catch(e){
    alert('❌ Não foi possível conectar ao servidor. Tente novamente em 1 minuto.');
    btn.disabled=false; btn.innerHTML='⬇️ Baixar MP3s'; busy=false;
  }
}

function pollStatus(){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval=setInterval(async()=>{
    try{
      const res=await fetch(`${SERVER_URL}/status/${jobId}`);
      const data=await res.json();

      const pct=data.total>0?Math.round((data.progress/data.total)*100):0;
      document.getElementById('progressFill').style.width=`${pct}%`;
      document.getElementById('progressCount').textContent=`${data.progress} / ${data.total}`;
      document.getElementById('progressCurrent').textContent=data.current||'Processando...';

      // Atualiza status de cada track
      if(data.tracks){
        data.tracks.forEach(t=>{
          const i=t.index;
          if(t.status==='ok') setTrackStatus(i,'ok',t);
          else if(t.status==='error') setTrackStatus(i,'error',t);
          else if(i===data.progress && data.status==='downloading') setTrackStatus(i,'dl',t);
        });
      }

      if(data.status==='done'){
        clearInterval(pollInterval);
        document.getElementById('progressCard').classList.remove('visible');
        const btn=document.getElementById('mainBtn');
        btn.disabled=false; btn.innerHTML='🔄 Nova Lista'; busy=false;
      } else if(data.status==='error'){
        clearInterval(pollInterval);
        document.getElementById('progressCard').classList.remove('visible');
        alert('❌ Erro no servidor: '+data.error);
        const btn=document.getElementById('mainBtn');
        btn.disabled=false; btn.innerHTML='⬇️ Baixar MP3s'; busy=false;
      }
    } catch(e){}
  },2000);
}

function resetApp(){
  if(pollInterval) clearInterval(pollInterval);
  document.getElementById('musicInput').value='';
  document.getElementById('tracksList').innerHTML='';
  document.getElementById('progressCard').classList.remove('visible');
  const btn=document.getElementById('mainBtn');
  btn.disabled=false; btn.innerHTML='⬇️ Baixar MP3s';
  jobId=null; tracks=[]; busy=false;
}
</script>
</body>
</html>
